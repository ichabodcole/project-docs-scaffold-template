    <style>
      :root {
        color-scheme: light;
        --text-primary: #2a2033;
        --text-muted: #7f6d88;
        --surface: #fff;
        --surface-soft: #fff8f2;
        --page-bg: #fff5f7;
        --page-wash:
          radial-gradient(
            circle at 10% 0%,
            rgba(255, 179, 193, 0.3),
            transparent 24rem
          ),
          linear-gradient(180deg, #fff8f8 0%, #fff5f7 46%, #fff 100%);
        --page-pattern:
          radial-gradient(
            circle,
            rgba(255, 122, 166, 0.18) 0 2px,
            transparent 2.5px
          ),
          radial-gradient(
            circle,
            rgba(106, 77, 188, 0.12) 0 1.5px,
            transparent 2px
          );
        --page-pattern-position: 28px 44px, 0 0;
        --page-pattern-size: 118px 118px, 167px 167px;
        --page-pattern-repeat: repeat;
        --page-pattern-opacity: 1;
        --brand-primary: #ff7aa6;
        --brand-strong: #ff4f84;
        --brand-secondary: #6a4dbc;
        --brand-tertiary: #9d6bff;
        --brand-ink: #2a2033;
        --brand-highlight: #ffd5e0;
        --border-subtle: #f5d5e0;
        --focus-ring: rgba(255, 122, 166, 0.18);
        --action-bg: linear-gradient(
          180deg,
          #ff93b4 0%,
          #ff5a8c 58%,
          #ee3f76 100%
        );
        --action-border: #db2f69;
        --action-highlight: rgba(255, 255, 255, 0.68);
        --action-shadow:
          inset 0 2px 0 var(--action-highlight),
          inset 0 -3px 0 rgba(165, 32, 78, 0.18),
          0 10px 24px rgba(255, 79, 132, 0.32),
          0 4px 10px rgba(165, 32, 78, 0.18);
        --question-bg: linear-gradient(
          180deg,
          #fff 0%,
          var(--surface-soft) 100%
        );
        --question-accent: var(--brand-secondary);
        --comment-bg: #fff6cc;
        --comment-border: #ffe06b;
        --code-bg: #fff0f5;
        --code-fg: #6a3c86;
        --code-block-bg: #fff;
        --input-bg: rgba(255, 255, 255, 0.88);
        --header-bg: rgba(255, 248, 250, 0.88);
        --header-border: rgba(245, 213, 224, 0.84);
        --action-text-shadow: 0 1px 0 rgba(122, 24, 58, 0.28);
        --action-active-shadow:
          inset 0 2px 0 var(--action-highlight),
          inset 0 -2px 0 rgba(165, 32, 78, 0.18),
          0 3px 0 color-mix(in srgb, var(--action-border) 78%, #000 22%),
          0 10px 18px rgba(255, 79, 132, 0.18);
        --brand-mark-filter: drop-shadow(0 7px 10px rgba(255, 79, 132, 0.18));
        --mascot-filter: drop-shadow(0 18px 28px rgba(106, 77, 188, 0.18));
        --elevation-soft: 0 8px 28px rgba(42, 32, 51, 0.05);
        --elevation-card: 0 18px 50px rgba(106, 77, 188, 0.16);
        --elevation-popover: 0 12px 28px rgba(42, 32, 51, 0.22);
        --stamp-text: "nom nom";
        --question-icon: "?";
      }
      body[data-theme="classic"] {
        --text-primary: #1a1a1a;
        --text-muted: #666;
        --surface: #fff;
        --surface-soft: #fafafa;
        --page-bg: #fafafa;
        --page-wash: linear-gradient(180deg, #fafafa 0%, #fff 100%);
        --page-pattern: none;
        --brand-primary: #2563eb;
        --brand-strong: #2563eb;
        --brand-secondary: #1d4ed8;
        --brand-tertiary: #60a5fa;
        --brand-ink: #111827;
        --brand-highlight: #dbeafe;
        --border-subtle: #e2e2e2;
        --focus-ring: rgba(37, 99, 235, 0.16);
        --action-bg: var(--brand-primary);
        --action-border: #1d4ed8;
        --action-highlight: rgba(255, 255, 255, 0.32);
        --action-shadow: 0 2px 8px rgba(0, 0, 0, 0.15);
        --question-bg: var(--surface);
        --question-accent: var(--brand-primary);
        --comment-bg: #fff7c2;
        --comment-border: #e0d27a;
        --code-bg: #f0f0f0;
        --code-fg: #1a1a1a;
        --code-block-bg: #f4f4f4;
        --input-bg: #fff;
        --header-bg: rgba(255, 255, 255, 0.94);
        --header-border: var(--border-subtle);
        --action-text-shadow: none;
        --action-active-shadow: 0 1px 3px rgba(0, 0, 0, 0.16);
        --brand-mark-filter: none;
        --mascot-filter: none;
        --elevation-soft: none;
        --elevation-card: none;
        --elevation-popover: 0 2px 8px rgba(0, 0, 0, 0.15);
        --stamp-text: "";
        --question-icon: "?";
      }
      body[data-theme="cthulhu"] {
        color-scheme: dark;
        --text-primary: #f0f0e6;
        --text-muted: #d7d6c2;
        --surface: #2b243b;
        --surface-soft: #211c30;
        --page-bg: #15141e;
        --page-wash: #15141e;
        --page-pattern:
          radial-gradient(
            circle at 8% 12%,
            rgba(167, 243, 161, 0.48) 0 1.7px,
            transparent 2.4px
          ),
          radial-gradient(
            circle at 17% 41%,
            rgba(240, 240, 230, 0.38) 0 1.2px,
            transparent 2px
          ),
          radial-gradient(
            circle at 27% 19%,
            rgba(165, 139, 207, 0.42) 0 1.6px,
            transparent 2.4px
          ),
          radial-gradient(
            circle at 38% 68%,
            rgba(167, 243, 161, 0.32) 0 1px,
            transparent 1.8px
          ),
          radial-gradient(
            circle at 49% 31%,
            rgba(240, 240, 230, 0.28) 0 1.1px,
            transparent 1.9px
          ),
          radial-gradient(
            circle at 61% 76%,
            rgba(165, 139, 207, 0.36) 0 1.5px,
            transparent 2.2px
          ),
          radial-gradient(
            circle at 73% 16%,
            rgba(167, 243, 161, 0.34) 0 1.2px,
            transparent 1.8px
          ),
          radial-gradient(
            circle at 84% 52%,
            rgba(240, 240, 230, 0.3) 0 1.3px,
            transparent 2px
          ),
          radial-gradient(
            circle at 92% 28%,
            rgba(165, 139, 207, 0.3) 0 1px,
            transparent 1.8px
          ),
          radial-gradient(
            circle at 13% 82%,
            rgba(167, 243, 161, 0.26) 0 1.1px,
            transparent 1.9px
          ),
          radial-gradient(
            circle at 56% 9%,
            rgba(240, 240, 230, 0.26) 0 1px,
            transparent 1.7px
          ),
          radial-gradient(
            circle at 88% 87%,
            rgba(167, 243, 161, 0.28) 0 1.2px,
            transparent 2px
          ),
          radial-gradient(
            circle at 22% 73%,
            rgba(240, 240, 230, 0.34) 0 1px,
            transparent 1.8px
          ),
          radial-gradient(
            circle at 34% 7%,
            rgba(167, 243, 161, 0.28) 0 1.2px,
            transparent 2px
          ),
          radial-gradient(
            circle at 44% 88%,
            rgba(165, 139, 207, 0.28) 0 1.1px,
            transparent 1.9px
          ),
          radial-gradient(
            circle at 67% 38%,
            rgba(240, 240, 230, 0.36) 0 1.3px,
            transparent 2.1px
          ),
          radial-gradient(
            circle at 78% 74%,
            rgba(167, 243, 161, 0.3) 0 1px,
            transparent 1.8px
          ),
          radial-gradient(
            circle at 96% 68%,
            rgba(165, 139, 207, 0.32) 0 1.2px,
            transparent 2px
          );
        --page-pattern-position: 0 0;
        --page-pattern-size: 100% 100%;
        --page-pattern-repeat: no-repeat;
        --page-pattern-opacity: 0.95;
        --brand-primary: #a7f3a1;
        --brand-strong: #7bc88b;
        --brand-secondary: #a58bcf;
        --brand-tertiary: #6d5a8c;
        --brand-ink: #f0f0e6;
        --brand-highlight: rgba(167, 243, 161, 0.32);
        --border-subtle: rgba(167, 243, 161, 0.18);
        --focus-ring: rgba(167, 243, 161, 0.18);
        --action-bg: linear-gradient(
          180deg,
          #a58bcf 0%,
          #7b61ad 58%,
          #5d4590 100%
        );
        --action-border: #2b243b;
        --action-highlight: rgba(240, 240, 230, 0.42);
        --action-shadow:
          inset 0 2px 0 var(--action-highlight),
          inset 0 -3px 0 rgba(21, 20, 30, 0.42),
          0 10px 22px rgba(165, 139, 207, 0.22), 0 4px 12px rgba(0, 0, 0, 0.36);
        --action-text-shadow: 0 1px 0 rgba(21, 20, 30, 0.55);
        --action-active-shadow:
          inset 0 2px 0 var(--action-highlight),
          inset 0 -2px 0 rgba(21, 20, 30, 0.32), 0 3px 0 #2b243b,
          0 10px 18px rgba(165, 139, 207, 0.16);
        --question-bg: linear-gradient(
          180deg,
          rgba(43, 36, 59, 0.96) 0%,
          #211c30 100%
        );
        --question-accent: #7bc88b;
        --comment-bg: rgba(37, 78, 74, 0.74);
        --comment-border: rgba(167, 243, 161, 0.32);
        --code-bg: rgba(165, 139, 207, 0.18);
        --code-fg: #d7d6c2;
        --code-block-bg: #211c30;
        --input-bg: rgba(21, 20, 30, 0.76);
        --header-bg: rgba(21, 20, 30, 0.88);
        --header-border: rgba(167, 243, 161, 0.14);
        --brand-mark-filter: drop-shadow(0 7px 14px rgba(167, 243, 161, 0.16));
        --mascot-filter: drop-shadow(0 18px 28px rgba(0, 0, 0, 0.38));
        --elevation-soft: 0 10px 32px rgba(0, 0, 0, 0.22);
        --elevation-card:
          0 18px 50px rgba(0, 0, 0, 0.28), 0 0 0 1px rgba(167, 243, 161, 0.08);
        --elevation-popover: 0 12px 30px rgba(0, 0, 0, 0.42);
        --stamp-text: "Eldritch\A knowledge";
        --question-icon: "◉";
      }
      * {
        box-sizing: border-box;
      }
      html {
        min-height: 100%;
        background: var(--page-bg);
      }
      body {
        margin: 0;
        min-height: 100vh;
        font:
          16px/1.68 -apple-system,
          BlinkMacSystemFont,
          "Segoe UI",
          system-ui,
          sans-serif;
        color: var(--text-primary);
        background: var(--page-wash);
      }
      body::before {
        content: "";
        position: fixed;
        inset: 0;
        pointer-events: none;
        background-image: var(--page-pattern);
        background-position: var(--page-pattern-position);
        background-size: var(--page-pattern-size);
        background-repeat: var(--page-pattern-repeat);
        opacity: var(--page-pattern-opacity);
        mask-image: linear-gradient(180deg, #000 0%, transparent 70%);
      }
      header {
        position: sticky;
        top: 0;
        background: var(--header-bg);
        border-bottom: 1px solid var(--header-border);
        padding: 12px 28px;
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 24px;
        z-index: 10;
        backdrop-filter: blur(18px);
        box-shadow: var(--elevation-soft);
      }
      .brand-lockup {
        min-width: 0;
      }
      .brand-mark {
        display: block;
        width: clamp(126px, 18vw, 192px);
        height: auto;
        margin: 0;
        filter: var(--brand-mark-filter);
      }
      .brand-text {
        display: inline-block;
        margin: 0;
        color: var(--brand-ink);
        font-size: 20px;
        line-height: 1;
        font-weight: 800;
      }
      header h1 {
        margin: 4px 0 0;
        color: var(--brand-ink);
        font-size: 13px;
        line-height: 1.3;
        font-weight: 700;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }
      header button {
        flex: 0 0 auto;
        background: var(--action-bg);
        color: white;
        border: 2px solid var(--action-border);
        padding: 10px 20px 12px;
        border-radius: 999px;
        font-size: 14px;
        font-weight: 900;
        letter-spacing: 0;
        cursor: pointer;
        text-shadow: var(--action-text-shadow);
        box-shadow: var(--action-shadow);
      }
      header button:hover {
        transform: translateY(-2px);
        filter: saturate(1.04);
      }
      header button:active {
        transform: translateY(4px);
        box-shadow: var(--action-active-shadow);
      }
      header button:disabled {
        cursor: wait;
        opacity: 0.72;
        transform: none;
      }
      main {
        position: relative;
        max-width: 860px;
        margin: 0 auto;
        padding: 42px 24px 120px;
      }
      .ambient-mascot {
        position: fixed;
        right: max(22px, calc((100vw - 1120px) / 2));
        bottom: 18px;
        width: clamp(120px, 16vw, 220px);
        z-index: 2;
        pointer-events: none;
        opacity: 0;
        transform: translateY(12px) rotate(-3deg);
        filter: var(--mascot-filter);
        transition:
          opacity 0.2s ease,
          transform 0.2s ease;
      }
      .ambient-mascot[src] {
        opacity: 1;
        transform: translateY(0) rotate(-3deg);
      }
      body[data-theme="classic"] .ambient-mascot {
        display: none;
      }
      main h1,
      main h2,
      main h3 {
        line-height: 1.25;
        color: var(--brand-ink);
        letter-spacing: 0;
      }
      main h1 {
        font-size: clamp(2rem, 5vw, 3.7rem);
        margin-top: 0;
      }
      main h2 {
        font-size: 1.6rem;
        margin-top: 2rem;
      }
      main pre {
        background: var(--code-block-bg);
        border: 1px solid var(--border-subtle);
        padding: 14px;
        border-radius: 8px;
        overflow-x: auto;
        box-shadow: var(--elevation-soft);
      }
      main code {
        background: var(--code-bg);
        color: var(--code-fg);
        padding: 1px 5px;
        border-radius: 5px;
        font-size: 0.92em;
      }
      main pre code {
        background: transparent;
        padding: 0;
      }
      main blockquote {
        border-left: 4px solid var(--brand-primary);
        margin: 0;
        padding-left: 16px;
        color: var(--text-muted);
      }
      main a {
        color: var(--brand-secondary);
        font-weight: 700;
      }
      .qcard {
        position: relative;
        background: var(--question-bg);
        border: 1px solid var(--border-subtle);
        border-radius: 8px;
        padding: 22px;
        margin: 30px 0;
        box-shadow: var(--elevation-card);
        overflow: hidden;
      }
      .qcard::before {
        content: "";
        position: absolute;
        inset: 0 auto 0 0;
        width: 6px;
        background: var(--question-accent);
      }
      .qstamp {
        position: absolute;
        right: 18px;
        top: 14px;
        color: color-mix(in srgb, var(--brand-strong) 16%, transparent);
        font-size: 22px;
        line-height: 0.95;
        font-weight: 900;
        text-transform: uppercase;
        transform: rotate(-8deg);
      }
      .qstamp span {
        display: block;
      }
      .qstamp-small {
        font-size: 0.62em;
        letter-spacing: 0.03em;
      }
      .qcard .qprompt {
        position: relative;
        display: flex;
        align-items: flex-start;
        gap: 10px;
        font-weight: 800;
        margin: 0 0 14px;
        max-width: 88%;
      }
      .qcard .qprompt::before {
        content: var(--question-icon);
        display: inline-grid;
        flex: 0 0 auto;
        place-items: center;
        width: 24px;
        height: 24px;
        border-radius: 999px;
        color: #fff;
        background: var(--brand-primary);
        font-size: 14px;
        line-height: 1;
        /* Bubble look: subtle inset highlight up top, inset shadow on the
           underside (purple-tinted to echo the side border), and a soft
           purple drop shadow to give it a touch of lift. */
        box-shadow:
          inset 0 1.5px 0 rgba(255, 255, 255, 0.55),
          inset 0 -2px 0
            color-mix(in srgb, var(--brand-secondary) 35%, transparent),
          0 4px 10px color-mix(in srgb, var(--brand-secondary) 24%, transparent);
      }
      .qcard textarea {
        position: relative;
        width: 100%;
        min-height: 92px;
        font: inherit;
        padding: 12px 14px;
        border: 1px solid var(--border-subtle);
        border-radius: 8px;
        resize: vertical;
        color: var(--text-primary);
        background: var(--input-bg);
        outline: none;
        transition:
          border-color 0.16s ease,
          box-shadow 0.16s ease;
      }
      .qcard textarea:focus,
      .inline-comment textarea:focus {
        border-color: var(--brand-primary);
        box-shadow: 0 0 0 4px var(--focus-ring);
      }
      .comment-chip {
        display: inline-block;
        background: var(--comment-bg);
        border: 1px solid var(--comment-border);
        padding: 6px 10px;
        border-radius: 999px;
        margin: 8px 0;
        font-size: 13px;
        box-shadow: 0 8px 18px
          color-mix(in srgb, var(--brand-primary) 14%, transparent);
      }
      .comment-chip .anchor {
        color: var(--text-muted);
        font-style: italic;
      }
      .floating-comment-btn {
        position: absolute;
        display: inline-flex;
        align-items: center;
        gap: 6px;
        background: var(--brand-ink);
        color: white;
        border: 0;
        padding: 8px 12px;
        border-radius: 999px;
        font-size: 12px;
        font-weight: 800;
        cursor: pointer;
        box-shadow: var(--elevation-popover);
        z-index: 100;
      }
      .floating-comment-btn::before {
        content: "";
        width: 7px;
        height: 7px;
        border-radius: 999px;
        background: var(--brand-primary);
        box-shadow:
          10px 0 0 var(--brand-primary),
          20px 0 0 var(--brand-primary);
      }
      .inline-comment {
        background: var(--surface);
        border: 1px solid var(--border-subtle);
        border-top: 3px solid var(--brand-primary);
        border-radius: 8px;
        padding: 14px;
        margin: 12px 0;
        box-shadow: var(--elevation-soft);
      }
      .inline-comment textarea {
        width: 100%;
        min-height: 50px;
        font: inherit;
        border: 1px solid var(--border-subtle);
        padding: 8px 10px;
        border-radius: 8px;
        outline: none;
      }
      .inline-comment .row {
        display: flex;
        gap: 8px;
        margin-top: 8px;
      }
      .inline-comment button {
        border: 0;
        border-radius: 999px;
        padding: 7px 12px;
        font-size: 12px;
        font-weight: 800;
        cursor: pointer;
      }
      .inline-comment button:first-child {
        background: var(--brand-strong);
        color: #fff;
      }
      .inline-comment button:last-child {
        background: var(--surface-soft);
        color: var(--brand-ink);
      }
      .done {
        text-align: center;
        padding: 80px 24px;
        color: var(--brand-ink);
      }
      .done h2 {
        display: inline-block;
        margin: 0 0 24px;
        font-size: 56px;
        font-weight: 900;
        letter-spacing: -1px;
        color: var(--brand-strong);
      }
      .done-mascot {
        display: block;
        margin: 0 auto 18px;
        width: clamp(120px, 18vw, 200px);
        filter: drop-shadow(0 14px 24px rgba(106, 77, 188, 0.2));
      }
      .done p {
        margin: 0;
        font-size: 16px;
        color: var(--text-muted);
      }
      ::selection {
        color: var(--brand-ink);
        background: var(--brand-highlight);
      }
      @media (max-width: 640px) {
        header {
          padding: 10px 16px;
        }
        .brand-mark {
          font-size: 23px;
        }
        header h1 {
          max-width: 58vw;
        }
        main {
          padding: 30px 16px 96px;
        }
        .qcard {
          padding: 18px;
        }
        .qcard .qprompt {
          max-width: 100%;
        }
        .ambient-mascot {
          display: none;
        }
      }
    </style>
  </head>
  <body data-theme="digestify">
    <header>
      <div class="brand-lockup">
        <img class="brand-mark" alt="Digestify" />
        <h1 id="page-title"></h1>
      </div>
      <button id="submit-btn" type="button">Submit</button>
    </header>
    <img class="ambient-mascot" alt="" aria-hidden="true" />
    <main id="doc"></main>
    <script id="payload" type="application/json">
      __PAYLOAD__
    </script>
    <script>
      (function () {
        const payload = JSON.parse(
          document.getElementById("payload").textContent
        );
        const themes = {
          digestify: {
            logoSrc: "/assets/classic/digestify-wordmark-classic.webp",
            brand: "Digestify",
            submit: "Digest it",
            submitting: "Digesting...",
            mascotSrc: "/assets/classic/digestify-mascot-classic.webp",
            sentMascotSrc: "/assets/classic/digested-classic.webp",
            stampLines: [{ text: "nom nom" }],
          },
          cthulhu: {
            logoSrc: "/assets/cthulhu/digestify-wordmark-cthulhu.webp",
            brand: "Digestify",
            submit: "Digest it",
            submitting: "Summoning...",
            mascotSrc: "/assets/cthulhu/digestify-mascot-cthulhu.webp",
            sentMascotSrc: "/assets/cthulhu/digested-cthulhu.webp",
            stampLines: [
              { text: "Eldritch" },
              { text: "knowledge", small: true },
            ],
          },
          classic: {
            logoSrc: "",
            brand: "Digestify",
            submit: "Submit",
            submitting: "Submitting...",
            mascotSrc: "",
            sentMascotSrc: "",
            stampLines: [],
          },
        };
        const activeTheme = themes[payload.theme] ? payload.theme : "digestify";
        const theme = themes[activeTheme];
        document.body.dataset.theme = activeTheme;
        const brandMark = document.querySelector(".brand-mark");
        if (theme.logoSrc) {
          brandMark.src = theme.logoSrc;
        } else {
          const brandText = document.createElement("span");
          brandText.className = "brand-text";
          brandText.textContent = theme.brand;
          brandMark.replaceWith(brandText);
        }
        document.getElementById("submit-btn").textContent = theme.submit;
        const mascot = document.querySelector(".ambient-mascot");
        if (theme.mascotSrc) mascot.src = theme.mascotSrc;
        document.getElementById("page-title").textContent = payload.title;
        document.title = payload.title;

        const sanitize = (html) =>
          DOMPurify.sanitize(html, { USE_PROFILES: { html: true } });
        const renderMd = (md) => sanitize(marked.parse(md));
        const renderInlineMd = (md) => sanitize(marked.parseInline(md));

        const questionsById = Object.fromEntries(
          payload.questions.map((q) => [q.id, q])
        );
        const answers = {};
        const comments = []; // {anchor, text}
        let submitted = false;
        // Set true once the user has typed an answer or saved a comment.
        // beforeunload only fires /cancel if dirty — refreshing a clean page
        // shouldn't kill the session.
        let dirty = false;

        // Render markdown, then replace QBLOCK comments with question cards.
        const docEl = document.getElementById("doc");
        docEl.innerHTML = renderMd(payload.markdown);
        document.querySelectorAll("pre code").forEach((el) => {
          if (typeof hljs !== "undefined") hljs.highlightElement(el);
        });

        // Replace [data-qblock] placeholders with question cards.
        // (HTML comments don't survive DOMPurify, so the parser emits
        // <div data-qblock="id"></div> markers instead.)
        docEl.querySelectorAll("[data-qblock]").forEach((node) => {
          const id = node.getAttribute("data-qblock");
          const q = questionsById[id];
          if (!q) return;
          const card = document.createElement("div");
          card.className = "qcard";
          if (theme.stampLines && theme.stampLines.length) {
            const stamp = document.createElement("div");
            stamp.className = "qstamp";
            stamp.setAttribute("aria-hidden", "true");
            theme.stampLines.forEach((line) => {
              const span = document.createElement("span");
              if (line.small) span.className = "qstamp-small";
              span.textContent = line.text;
              stamp.appendChild(span);
            });
            card.appendChild(stamp);
          }
          const prompt = document.createElement("div");
          prompt.className = "qprompt";
          prompt.innerHTML = renderInlineMd(q.prompt);
          const ta = document.createElement("textarea");
          ta.placeholder = "Your answer...";
          ta.addEventListener("input", () => {
            dirty = true;
            if (ta.value.trim()) answers[id] = ta.value;
            else delete answers[id];
          });
          card.appendChild(prompt);
          card.appendChild(ta);
          node.parentNode.replaceChild(card, node);
        });

        // Floating comment button on text selection.
        let floatingBtn = null;
        document.addEventListener("mouseup", (ev) => {
          if (submitted) return;
          // Don't dismiss the floating button if the user clicked it.
          if (floatingBtn && floatingBtn.contains(ev.target)) return;
          const sel = window.getSelection();
          const text = sel.toString().trim();
          if (floatingBtn) {
            floatingBtn.remove();
            floatingBtn = null;
          }
          if (!text || !docEl.contains(sel.anchorNode)) return;
          const range = sel.getRangeAt(0);
          const rect = range.getBoundingClientRect();
          floatingBtn = document.createElement("button");
          floatingBtn.className = "floating-comment-btn";
          floatingBtn.textContent = "Comment";
          floatingBtn.style.left = rect.left + window.scrollX + "px";
          floatingBtn.style.top = rect.bottom + window.scrollY + 6 + "px";
          // Stop mousedown/up from collapsing the selection or re-triggering
          // the document-level mouseup handler that just removed previous
          // buttons. Use mousedown so we act before the click event arrives.
          floatingBtn.addEventListener("mousedown", (e) => {
            e.preventDefault();
            e.stopPropagation();
            openCommentBox(text, range);
          });
          document.body.appendChild(floatingBtn);
        });

        function nearestBlock(node) {
          const el = node.nodeType === 3 ? node.parentElement : node;
          return el.closest("p,li,blockquote,pre,h1,h2,h3,h4,h5,h6") || docEl;
        }

        function openCommentBox(anchorText, range) {
          if (floatingBtn) {
            floatingBtn.remove();
            floatingBtn = null;
          }
          const para = nearestBlock(range.endContainer);
          const box = document.createElement("div");
          box.className = "inline-comment";

          const label = document.createElement("div");
          label.style.cssText =
            "font-size:13px;color:var(--text-muted);margin-bottom:6px";
          const labelLead = document.createTextNode("on: ");
          const labelQuote = document.createElement("i");
          labelQuote.textContent =
            '"' +
            anchorText.slice(0, 80) +
            (anchorText.length > 80 ? "…" : "") +
            '"';
          label.appendChild(labelLead);
          label.appendChild(labelQuote);

          const ta = document.createElement("textarea");
          ta.placeholder = "Comment...";

          const row = document.createElement("div");
          row.className = "row";
          const saveBtn = document.createElement("button");
          saveBtn.textContent = "Save";
          const cancelBtn = document.createElement("button");
          cancelBtn.textContent = "Cancel";
          row.appendChild(saveBtn);
          row.appendChild(cancelBtn);

          box.appendChild(label);
          box.appendChild(ta);
          box.appendChild(row);

          ta.focus();
          saveBtn.addEventListener("click", () => {
            const text = ta.value.trim();
            if (text) {
              comments.push({ anchor: anchorText, text });
              dirty = true;
              const chip = document.createElement("div");
              chip.className = "comment-chip";
              const anchorSpan = document.createElement("span");
              anchorSpan.className = "anchor";
              anchorSpan.textContent =
                '"' +
                anchorText.slice(0, 60) +
                (anchorText.length > 60 ? "…" : "") +
                '"';
              const sep = document.createTextNode(": ");
              const textSpan = document.createElement("span");
              textSpan.textContent = text;
              chip.appendChild(anchorSpan);
              chip.appendChild(sep);
              chip.appendChild(textSpan);
              para.parentNode.insertBefore(chip, para.nextSibling);
            }
            box.remove();
          });
          cancelBtn.addEventListener("click", () => box.remove());
          para.parentNode.insertBefore(box, para.nextSibling);
        }

        function showSentScreen() {
          while (document.body.firstChild)
            document.body.removeChild(document.body.firstChild);

          const wrap = document.createElement("div");
          wrap.className = "done";

          // If the theme provides a sent-page mascot (e.g. the "digested"
          // illustration), the mascot itself communicates "you're done" —
          // no headline needed. Otherwise fall back to a "✓ Sent" headline
          // and, if available, the ambient mascot below it.
          if (theme.sentMascotSrc) {
            const m = document.createElement("img");
            m.className = "done-mascot";
            m.src = theme.sentMascotSrc;
            m.alt = "Digested";
            wrap.appendChild(m);
          } else {
            const h2 = document.createElement("h2");
            h2.textContent = "✓ Sent";
            wrap.appendChild(h2);

            const ambient = document.querySelector(".ambient-mascot");
            const ambientSrc = ambient && ambient.getAttribute("src");
            if (ambientSrc) {
              const m = document.createElement("img");
              m.className = "done-mascot";
              m.src = ambientSrc;
              m.alt = "";
              m.setAttribute("aria-hidden", "true");
              wrap.appendChild(m);
            }
          }

          const p = document.createElement("p");
          p.textContent = "You can close this tab.";
          wrap.appendChild(p);

          document.body.appendChild(wrap);
        }

        document
          .getElementById("submit-btn")
          .addEventListener("click", async () => {
            const btn = document.getElementById("submit-btn");
            btn.disabled = true;
            btn.textContent = theme.submitting;
            try {
              const res = await fetch("/submit", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ answers, comments }),
              });
              if (!res.ok) throw new Error("submit failed");
              submitted = true;
              showSentScreen();
            } catch (err) {
              btn.disabled = false;
              btn.textContent = theme.submit;
              alert("Submit failed: " + err.message);
            }
          });

        window.addEventListener("beforeunload", () => {
          // Only cancel if the user actually typed something — refreshing a
          // clean page (or accidentally hitting Cmd+W on a fresh tab) shouldn't
          // exit the session. The script's --timeout is the failsafe for true
          // abandons.
          if (!submitted && dirty && navigator.sendBeacon) {
            navigator.sendBeacon(
              "/cancel",
              new Blob([], { type: "application/json" })
            );
          }
        });
      })();
    </script>
  </body>
</html>
