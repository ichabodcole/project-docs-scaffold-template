<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Mockup — [Feature Name]</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script>
      tailwind.config = {
        darkMode: "class",
      };
    </script>

    <!--
      ============================================================
      THEME
      Semantic classes built on Tailwind utilities via @apply.
      Change the color palette here to match the target project's
      design system; the markup below stays readable and consistent.

      Default: dark theme (slate-950 base).
      For light themes: adjust base/surface/text colors throughout.
      ============================================================
    -->
    <style type="text/tailwindcss">
      /* ---- Base ---- */
      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }
      .line-clamp-2 {
        display: -webkit-box;
        -webkit-line-clamp: 2;
        -webkit-box-orient: vertical;
        overflow: hidden;
      }

      /* ---- Typography ---- */
      .page-title {
        @apply text-2xl font-bold text-white;
      }
      .section-title {
        @apply text-xs font-semibold text-slate-400 uppercase tracking-wide;
      }
      .label {
        @apply text-xs text-slate-500;
      }
      .text-body {
        @apply text-sm text-slate-200 leading-relaxed;
      }
      .text-muted {
        @apply text-sm text-slate-400;
      }
      .text-faint {
        @apply text-xs text-slate-500;
      }
      .text-mono {
        @apply text-xs text-slate-600 font-mono;
      }
      .link {
        @apply text-sm text-blue-400 hover:text-blue-300 transition-colors;
      }

      /* ---- Surfaces ---- */
      .card {
        @apply bg-slate-900 border border-slate-800 rounded-lg overflow-hidden;
      }
      .inset {
        @apply bg-slate-950 border border-slate-800 rounded-md;
      }
      .panel-section {
        @apply px-5 py-4 border-b border-slate-800;
      }

      /* ---- Badges ---- */
      .badge {
        @apply text-xs px-2 py-0.5 rounded border font-medium;
      }
      .badge-accent {
        @apply badge bg-blue-500/10 text-blue-300 border-blue-500/20;
      }
      .badge-muted {
        @apply badge bg-slate-700/50 text-slate-300 border-slate-600;
      }
      .badge-warning {
        @apply badge bg-amber-500/20 text-amber-400 border-amber-500/30;
      }

      /* ---- Status indicators ---- */
      .status-dot {
        @apply w-2 h-2 rounded-full shrink-0;
      }
      .status-dot-open {
        @apply status-dot bg-amber-400;
      }
      .status-dot-success {
        @apply status-dot bg-emerald-400;
      }

      /* ---- Buttons ---- */
      .btn {
        @apply text-sm px-4 py-2 rounded-md font-medium transition-colors
               flex items-center justify-center gap-2;
      }
      .btn-primary {
        @apply btn bg-emerald-600 text-white hover:bg-emerald-500;
      }
      .btn-outline {
        @apply btn border border-slate-700 text-slate-300 hover:bg-slate-800;
      }
      .btn-ghost {
        @apply text-xs px-3 py-2 rounded-md border border-slate-800
               text-slate-500 hover:text-slate-300 hover:border-slate-700
               transition-colors flex items-center justify-center gap-2;
      }
      .btn-icon {
        @apply text-slate-500 hover:text-white transition-colors;
      }

      /* ---- Form controls ---- */
      .input {
        @apply bg-slate-900 border border-slate-700 text-sm text-white
               px-3 py-2 rounded-md placeholder-slate-500
               focus:outline-none focus:border-slate-500;
      }
      .select {
        @apply input cursor-pointer text-slate-300;
      }
      .textarea {
        @apply w-full bg-slate-950 border border-slate-800 text-sm text-white
               px-3 py-2 rounded-md placeholder-slate-600
               focus:outline-none focus:border-slate-600 resize-none;
      }

      /* ---- Navigation ---- */
      .nav-item {
        @apply w-full flex items-center gap-3 px-3 py-2 rounded-md
               text-sm font-medium transition-colors;
      }
      .nav-item-active {
        @apply bg-slate-800 text-white;
      }
      .nav-item-inactive {
        @apply text-slate-400 hover:text-white hover:bg-slate-800/50;
      }

      /* ---- Utilities ---- */
      .filter-pill {
        @apply inline-flex items-center gap-1 text-xs bg-slate-800
               text-slate-300 border border-slate-700 px-2 py-0.5 rounded;
      }
      .skeleton {
        background: linear-gradient(90deg, #1e293b 25%, #334155 50%, #1e293b 75%);
        background-size: 200% 100%;
        animation: shimmer 1.4s infinite;
        border-radius: 4px;
      }
      @keyframes shimmer {
        0% { background-position: 200% 0; }
        100% { background-position: -200% 0; }
      }
    </style>

    <!--
      ============================================================
      APP STATE
      Register all state and methods with Alpine.data() below.
      Use x-data="app" on the root element in the body.
      ============================================================
    -->
    <script>
      document.addEventListener("alpine:init", () => {
        Alpine.data("app", () => ({
          state: "default",

          // TODO: Add your state properties here

        }));
      });
    </script>
    <script
      defer
      src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"
    ></script>
  </head>
  <body class="bg-slate-950 text-slate-200 min-h-screen">
    <div x-data="app">
      <!-- State switcher -->
      <div
        class="bg-amber-950/60 border-b border-amber-800/40 px-6 py-2 flex items-center gap-3 sticky top-0 z-50"
      >
        <span class="section-title text-amber-500">Prototype state</span>
        <div class="flex gap-2 flex-wrap">
          <button
            @click="state = 'default'"
            :class="state === 'default' ? 'bg-amber-600 text-white border-amber-600' : 'bg-slate-800 text-slate-300 border-slate-600'"
            class="text-xs px-3 py-1 rounded border font-medium"
          >
            1 · Default
          </button>
          <button
            @click="state = 'state-two'"
            :class="state === 'state-two' ? 'bg-amber-600 text-white border-amber-600' : 'bg-slate-800 text-slate-300 border-slate-600'"
            class="text-xs px-3 py-1 rounded border font-medium"
          >
            2 · State Two
          </button>
          <button
            @click="state = 'state-three'"
            :class="state === 'state-three' ? 'bg-amber-600 text-white border-amber-600' : 'bg-slate-800 text-slate-300 border-slate-600'"
            class="text-xs px-3 py-1 rounded border font-medium"
          >
            3 · State Three
          </button>
        </div>
      </div>

      <!--
        ============================================================
        CONTENT AREA — blank canvas
        Build your prototype layout here. The template makes no
        layout decisions — sidebar nav, single column, split pane,
        etc. are determined by what you're prototyping.
        ============================================================
      -->
      <div class="p-8">
        <div x-show="state === 'default'">
          <h1 class="page-title mb-4">Default State</h1>
          <p class="text-muted">Replace this with your prototype content.</p>
        </div>
        <div x-show="state === 'state-two'">
          <h1 class="page-title mb-4">State Two</h1>
          <p class="text-muted">Replace this with your prototype content.</p>
        </div>
        <div x-show="state === 'state-three'">
          <h1 class="page-title mb-4">State Three</h1>
          <p class="text-muted">Replace this with your prototype content.</p>
        </div>
      </div>

    </div>

    <!-- Initialize Lucide icons with Alpine-aware refresh -->
    <script>
      lucide.createIcons();
      document.addEventListener("alpine:initialized", () => {
        let pending = false;
        const observer = new MutationObserver(() => {
          if (pending) return;
          pending = true;
          requestAnimationFrame(() => {
            lucide.createIcons();
            pending = false;
          });
        });
        observer.observe(document.body, { childList: true, subtree: true });
      });
    </script>
  </body>
</html>
